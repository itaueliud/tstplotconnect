<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TST PlotConnect Super Admin</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="app"></div>
  <script>
    const forceHttpsHosts = new Set(["www.tst-plotconnect.com", "tst-plotconnect.com"]);
    if (window.location.protocol === "http:" && forceHttpsHosts.has(window.location.hostname)) {
      window.location.replace(`https://${window.location.host}${window.location.pathname}${window.location.search}${window.location.hash}`);
    }
  </script>
  <script>
    (function() {
      const host = window.location.hostname;
      const proto = window.location.protocol;
      const localHostPattern = /^(localhost|127\.0\.0\.1|192\.168\.\d{1,3}\.\d{1,3}|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3})$/i;
      if (proto === "file:" || localHostPattern.test(host)) {
        localStorage.removeItem("apiBase");
        const localHost = host && host !== "" ? host : "localhost";
        window.NEXT_PUBLIC_API_URL = `http://${localHost}:10000`;
      } else {
        window.NEXT_PUBLIC_API_URL = "https://tstplotconnect-2.onrender.com";
      }
    })();
  </script>
  <script type="module" src="/features/superadmin-dashboard.js"></script>
</body>
</html>
