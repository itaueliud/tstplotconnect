<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plots & Rentals | TST PlotConnect</title>
  <meta name="description" content="Browse verified plots and rental listings across Kenya. Filter by county and area to find the right location.">
  <meta name="keywords" content="plots Kenya, rentals Kenya, land listings, verified plots, Machakos plots, Nairobi rentals">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://www.tst-plotconnect.com/plots">
  <script>
    if (window.location.pathname.endsWith("/plots.html")) {
      window.location.replace("/plots");
    }
  </script>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="TST PlotConnect">
  <meta property="og:title" content="Plots & Rentals | TST PlotConnect">
  <meta property="og:description" content="Browse verified plots and rental listings across Kenya.">
  <meta property="og:url" content="https://www.tst-plotconnect.com/plots">
  <meta property="og:image" content="https://www.tst-plotconnect.com/favicon.svg">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/user.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen text-slate-900">
  <main class="max-w-5xl mx-auto px-6 py-12">
    <section class="glass rounded-2xl p-6 md:p-8">
      <h1 class="text-3xl md:text-4xl font-bold mb-3 text-slate-900">Plots & Rentals</h1>
      <p class="text-slate-700 mb-5">
        Live listings from the database are shown below. Use the main app for full filters, details, and map view.
      </p>
      <div class="flex flex-wrap gap-3">
        <a class="inline-block btn-success rounded-xl px-4 py-2" href="/#user-listings">Open Listings UI</a>
        <a class="inline-block btn-soft rounded-xl px-4 py-2" href="/">Go to Main App</a>
      </div>
    </section>

    <section class="mt-6">
      <div class="flex items-center justify-between gap-4 mb-3">
        <h2 class="text-xl font-semibold text-slate-900">All Available Counties</h2>
        <p id="count" class="text-sm text-slate-600"></p>
      </div>
      <p id="status" class="text-sm text-slate-700 mb-4">Loading counties...</p>
      <div id="plots-grid" class="plot-grid"></div>
    </section>
  </main>

  <script>
    const localApiHostPattern = /^(localhost|127\.0\.0\.1|192\.168\.\d{1,3}\.\d{1,3}|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3})$/i;
    const isLocalApiHost = localApiHostPattern.test(window.location.hostname);
    const API_BASE_URL = isLocalApiHost
      ? `http://${window.location.hostname}:10000`
      : "https://tstplotconnect-2.onrender.com";

    const statusEl = document.getElementById("status");
    const countEl = document.getElementById("count");
    const gridEl = document.getElementById("plots-grid");

    function formatPrice(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return "Price on request";
      return `KES ${num.toLocaleString()}`;
    }

    function toCountyRows(plots) {
      const byCounty = new Map();
      plots.forEach((plot) => {
        const country = (plot.country || "Kenya").trim();
        const county = (plot.county || plot.town || "").trim();
        const area = (plot.area || "").trim();
        if (!county) return;
        const key = `${country}|${county}`;
        const existing = byCounty.get(key) || {
          country,
          county,
          count: 0,
          image: "",
          minPrice: null
        };
        existing.count += 1;
        if (!existing.image && Array.isArray(plot.images) && plot.images[0]) {
          existing.image = plot.images[0];
        }
        const price = Number(plot.price);
        if (Number.isFinite(price)) {
          existing.minPrice = existing.minPrice == null ? price : Math.min(existing.minPrice, price);
        }
        byCounty.set(key, existing);
      });
      return Array.from(byCounty.values()).sort((a, b) =>
        a.county.localeCompare(b.county)
      );
    }

    function cardHtml(countyRow) {
      const image = countyRow.image || "";
      const location = [countyRow.county, countyRow.country].filter(Boolean).join(", ");
      const target = `/?country=${encodeURIComponent(countyRow.country)}&county=${encodeURIComponent(countyRow.county)}#user-listings`;
      return `
        <a href="${target}" class="plot-card block no-underline">
          ${image ? `<img src="${image}" alt="${countyRow.county || "County"} image" class="plot-image">` : '<div class="plot-image media-empty">No image</div>'}
          <h3 class="text-lg font-semibold mt-3 mb-1">${countyRow.county}</h3>
          <p class="plot-meta mb-2">${location || "Location not set"}</p>
          <p class="font-semibold text-slate-800 mb-2">${countyRow.count} listing${countyRow.count === 1 ? "" : "s"}</p>
          <p class="text-sm text-slate-700">${countyRow.minPrice == null ? "Price on request" : `Starting from ${formatPrice(countyRow.minPrice)}`}</p>
        </a>
      `;
    }

    async function loadPlots() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/plots`, { headers: { Accept: "application/json" } });
        if (!res.ok) throw new Error(`Failed to load listings (${res.status})`);
        const plots = await res.json();
        if (!Array.isArray(plots)) throw new Error("Invalid listings response");
        const counties = toCountyRows(plots);

        countEl.textContent = `${counties.length} county${counties.length === 1 ? "" : "ies"}`;
        if (!counties.length) {
          statusEl.textContent = "No counties found in the database yet.";
          gridEl.innerHTML = "";
          return;
        }

        statusEl.textContent = "Click any county to open filtered listings in the user app.";
        gridEl.innerHTML = counties.map(cardHtml).join("");
      } catch (err) {
        statusEl.textContent = err && err.message
          ? `${err.message}. Use the main app while we reconnect.`
          : "Could not load listings right now.";
        countEl.textContent = "";
        gridEl.innerHTML = "";
      }
    }

    loadPlots();
  </script>
</body>
</html>
