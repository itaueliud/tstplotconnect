<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plots & Rentals | TST PlotConnect</title>
  <meta name="description" content="Browse verified plots and rental listings across Kenya. Filter by county and area to find the right location.">
  <meta name="keywords" content="plots Kenya, rentals Kenya, land listings, verified plots, Machakos plots, Nairobi rentals">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://www.tst-plotconnect.com/plots">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="TST PlotConnect">
  <meta property="og:title" content="Plots & Rentals | TST PlotConnect">
  <meta property="og:description" content="Browse verified plots and rental listings across Kenya.">
  <meta property="og:url" content="https://www.tst-plotconnect.com/plots">
  <meta property="og:image" content="https://www.tst-plotconnect.com/favicon.svg">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/user.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen text-slate-900">
  <main class="max-w-5xl mx-auto px-6 py-12">
    <section class="glass rounded-2xl p-6 md:p-8">
      <h1 class="text-3xl md:text-4xl font-bold mb-3 text-slate-900">Plots & Rentals</h1>
      <p class="text-slate-700 mb-5">
        Live listings from the database are shown below. Use the main app for full filters, details, and map view.
      </p>
      <div class="flex flex-wrap gap-3">
        <a class="inline-block btn-success rounded-xl px-4 py-2" href="/#user-listings">Open Listings UI</a>
        <a class="inline-block btn-soft rounded-xl px-4 py-2" href="/">Go to Main App</a>
      </div>
    </section>

    <section class="mt-6">
      <div class="flex items-center justify-between gap-4 mb-3">
        <h2 class="text-xl font-semibold text-slate-900">All Available Plots</h2>
        <p id="count" class="text-sm text-slate-600"></p>
      </div>
      <p id="status" class="text-sm text-slate-700 mb-4">Loading listings...</p>
      <div id="plots-grid" class="plot-grid"></div>
    </section>
  </main>

  <script>
    const localApiHostPattern = /^(localhost|127\.0\.0\.1|192\.168\.\d{1,3}\.\d{1,3}|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3})$/i;
    const isLocalApiHost = localApiHostPattern.test(window.location.hostname);
    const API_BASE_URL = isLocalApiHost
      ? `http://${window.location.hostname}:10000`
      : "https://tstplotconnect-2.onrender.com";

    const statusEl = document.getElementById("status");
    const countEl = document.getElementById("count");
    const gridEl = document.getElementById("plots-grid");

    function formatPrice(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return "Price on request";
      return `KES ${num.toLocaleString()}`;
    }

    function cardHtml(plot) {
      const image = Array.isArray(plot.images) && plot.images.length > 0 ? plot.images[0] : "";
      const location = [plot.area, plot.county || plot.town, plot.country].filter(Boolean).join(", ");
      const description = (plot.description || "").trim() || "No description provided.";
      const safeDescription = description.length > 170 ? `${description.slice(0, 170)}...` : description;
      return `
        <article class="plot-card">
          ${image ? `<img src="${image}" alt="${plot.title || "Plot"} image" class="plot-image">` : '<div class="plot-image media-empty">No image</div>'}
          <h3 class="text-lg font-semibold mt-3 mb-1">${plot.title || "Untitled listing"}</h3>
          <p class="plot-meta mb-2">${location || "Location not set"}</p>
          <p class="font-semibold text-slate-800 mb-2">${formatPrice(plot.price)}</p>
          <p class="text-sm text-slate-700">${safeDescription}</p>
        </article>
      `;
    }

    async function loadPlots() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/plots`, { headers: { Accept: "application/json" } });
        if (!res.ok) throw new Error(`Failed to load listings (${res.status})`);
        const plots = await res.json();
        if (!Array.isArray(plots)) throw new Error("Invalid listings response");

        countEl.textContent = `${plots.length} result${plots.length === 1 ? "" : "s"}`;
        if (!plots.length) {
          statusEl.textContent = "No listings found in the database yet.";
          gridEl.innerHTML = "";
          return;
        }

        statusEl.textContent = "Showing latest listings from the database.";
        gridEl.innerHTML = plots.map(cardHtml).join("");
      } catch (err) {
        statusEl.textContent = err && err.message
          ? `${err.message}. Use the main app while we reconnect.`
          : "Could not load listings right now.";
        countEl.textContent = "";
        gridEl.innerHTML = "";
      }
    }

    loadPlots();
  </script>
</body>
</html>
