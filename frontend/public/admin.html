<body>
  <div id="app"></div>
  <noscript>
    <main>
      <h1>AfricaRentalGrid | Find Hostels, Bedsitters & Lodges Near You</h1>
      <p>AfricaRentalGrid helps students and travelers find nearby hostels, bedsitters, and lodges quickly and affordably. Safe, verified, and convenient options near you.</p>
    </main>
  </noscript>
  <script>
    const forceHttpsHosts = new Set(["www.tst-plotconnect.com", "tst-plotconnect.com"]);
    if (window.location.protocol === "http:" && forceHttpsHosts.has(window.location.hostname)) {
      window.location.replace(`https://${window.location.host}${window.location.pathname}${window.location.search}${window.location.hash}`);
    }
  </script>
  <script>
    const localApiHostPattern = /^(localhost|127\.0\.0\.1|192\.168\.\d{1,3}\.\d{1,3}|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3})$/i;
    const isLocalApiHost = localApiHostPattern.test(window.location.hostname);
    window.NEXT_PUBLIC_API_URL = isLocalApiHost
      ? `http://${window.location.hostname}:10000`
      : "";
  </script>
  <script type="module" src="/features/user-app.js"></script>
