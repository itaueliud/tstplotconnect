<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/user.css">

</head>
<body class="min-h-screen text-slate-900">
  <main class="max-w-3xl mx-auto px-6 py-12">
    <div class="flex items-center justify-between">
      <a class="btn-soft px-4 py-2 rounded-xl" href="/blogs">Back to Blog</a>
      <a class="btn-success px-4 py-2 rounded-xl" href="/">Home</a>
    </div>

    <article class="mt-8">
      <p id="post-kicker" class="text-emerald-700 uppercase tracking-widest text-xs font-semibold">Blog Post</p>
      <h1 id="post-title" class="text-3xl md:text-4xl font-bold mt-3">Loading...</h1>
      <p id="post-meta" class="text-slate-500 mt-2"></p>

      <div id="post-content" class="mt-6 space-y-5 text-slate-700 leading-relaxed"></div>
    </article>

    <div id="post-error" class="hidden mt-6 text-red-700"></div>

    <section class="mt-10">
      <div class="flex flex-col gap-2 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="section-kicker">Keep Reading</p>
          <h2 class="text-xl font-semibold">Related posts</h2>
        </div>
        <p class="text-sm text-slate-500">More guides from the same topic when available.</p>
      </div>
      <div id="related-posts" class="mt-4 grid gap-4 md:grid-cols-2"></div>
    </section>
  </main>

  <script>
    (function() {
      const host = window.location.hostname;
      const proto = window.location.protocol;
      if (proto === "file:" || host === "localhost" || host === "127.0.0.1") {
        localStorage.removeItem("apiBase");
        window.NEXT_PUBLIC_API_URL = "http://localhost:10000";
      } else {
        window.NEXT_PUBLIC_API_URL = "https://tstplotconnect-2.onrender.com";
      }
    })();
  </script>
  <script type="module" src="/features/blog-post.js"></script>
</body>
</html>
