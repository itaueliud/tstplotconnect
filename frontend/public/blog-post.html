<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post | TST PlotConnect</title>
  <meta id="meta-description" name="description" content="Read the latest tips and guides from TST PlotConnect.">
  <meta name="robots" content="index,follow">
  <link id="canonical-link" rel="canonical" href="https://www.tst-plotconnect.com/blog">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="TST PlotConnect">
  <meta id="og-title" property="og:title" content="Blog Post | TST PlotConnect">
  <meta id="og-description" property="og:description" content="Read the latest tips and guides from TST PlotConnect.">
  <meta id="og-url" property="og:url" content="https://www.tst-plotconnect.com/blog">
  <meta property="og:image" content="https://www.tst-plotconnect.com/favicon.svg">
  <meta name="twitter:card" content="summary">
  <meta id="twitter-title" name="twitter:title" content="Blog Post | TST PlotConnect">
  <meta id="twitter-description" name="twitter:description" content="Read the latest tips and guides from TST PlotConnect.">
  <meta name="twitter:image" content="https://www.tst-plotconnect.com/favicon.svg">
  <script id="post-schema" type="application/ld+json"></script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/user.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen text-slate-900">
  <main class="max-w-3xl mx-auto px-6 py-12">
    <div class="flex items-center justify-between">
      <a class="btn-soft px-4 py-2 rounded-xl" href="/blog.html">Back to Blog</a>
      <a class="btn-success px-4 py-2 rounded-xl" href="/">Home</a>
    </div>

    <article class="mt-8">
      <p id="post-kicker" class="text-emerald-700 uppercase tracking-widest text-xs font-semibold">Blog Post</p>
      <h1 id="post-title" class="text-3xl md:text-4xl font-bold mt-3">Loading...</h1>
      <p id="post-meta" class="text-slate-500 mt-2"></p>

      <div id="post-content" class="mt-6 space-y-5 text-slate-700 leading-relaxed"></div>
    </article>

    <div id="post-error" class="hidden mt-6 text-red-700"></div>

    <section class="mt-10">
      <h2 class="text-xl font-semibold">Related posts</h2>
      <div id="related-posts" class="mt-4 grid gap-4 md:grid-cols-2"></div>
    </section>
  </main>

  <script>
    (function() {
      const host = window.location.hostname;
      const proto = window.location.protocol;
      if (proto === "file:" || host === "localhost" || host === "127.0.0.1") {
        localStorage.removeItem("apiBase");
        window.NEXT_PUBLIC_API_URL = "http://localhost:10000";
      } else {
        window.NEXT_PUBLIC_API_URL = "https://tstplotconnect-2.onrender.com";
      }
    })();
  </script>
  <script type="module" src="/features/blog-post.js"></script>
</body>
</html>
